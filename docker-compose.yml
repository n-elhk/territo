services:
  postgres:
    image: postgis/postgis:18-3.6
    container_name: territo-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-territo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-territo}
      POSTGRES_DB: ${DB_NAME:-territo}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./infra/docker/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-territo} -d ${DB_NAME:-territo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: territo-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/territo-api/Dockerfile
    container_name: territo-api
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-territo}
      DB_USER: ${DB_USER:-territo}
      DB_PASSWORD: ${DB_PASSWORD:-territo}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-changeme_access_secret_at_least_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh_secret_at_least_32_chars}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
